<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLP {{ clp_ip }} - IP Monitor</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='clp.css') }}">
    <script>
        const APP_CONFIG = {
            routesPrefix: '{{ ROUTES_PREFIX }}',
            domainBase: '{{ DOMAIN_BASE }}',
            projectName: '{{ PROJECT_NAME }}'
        };

        function getStaticPath() {
            return '{{ url_for("static", filename="") }}';
        }
    </script>
    <script>
        function getBasePath() {
            const path = window.location.pathname;
            return path.includes(APP_CONFIG.routesPrefix + '/') ? APP_CONFIG.routesPrefix + '/' : '/';
        }
        function navigateTo(page) {
            const basePath = getBasePath();
            if (page === 'home') {
                window.location.href = basePath;
            } else {
                window.location.href = basePath + page;
            }
        }
    </script>
</head>
<body>

<header class="header">
    <div class="header-content">
        <div class="header-left">
            <h1><i class="fas fa-network-wired"></i> Rede <span class="h1-sub">· CLP {{ clp_ip }}</span></h1>
            <nav class="header-nav">
                <a href="javascript:navigateTo('home')">
                    <i class="fas fa-home"></i><span>Início</span>
                </a>
                <div class="nav-item-dropdown">
                    <a href="javascript:navigateTo('clps')" class="active" data-dropdown-toggle>
                        <i class="fas fa-server"></i><span>CLPs</span>
                        <i class="fas fa-chevron-down nav-chevron"></i>
                    </a>
                    <ul class="nav-submenu" id="clps-submenu" role="menu">
                        <li class="nav-submenu-loading">Carregando…</li>
                    </ul>
                </div>
                <a href="javascript:navigateTo('configuracoes')">
                    <i class="fas fa-cog"></i><span>Configurações</span>
                </a>
            </nav>
        </div>
        <a href="https://automacao.tce.go.gov.br/" class="header-badge" title="Voltar ao Dashboard Principal">
            <i class="fas fa-shield-alt"></i> TCE-GO
        </a>
    </div>
</header>

<main>
    <div class="container">

        <!-- Stats cards (mesmo padrão da página /clps) -->
        <div class="stats-grid">
            <div class="stat-card stat-vis">
                <div class="stat-icon"><i class="fas fa-server"></i></div>
                <div class="stat-info">
                    <span class="stat-value" id="clp-status-pill">--</span>
                    <span class="stat-label" id="clp-ip">{{ clp_ip }}</span>
                </div>
            </div>
            <div class="stat-card stat-tot">
                <div class="stat-icon"><i class="fas fa-plug"></i></div>
                <div class="stat-info">
                    <span class="stat-value" id="total-pontos">0</span>
                    <span class="stat-label">Pontos I/O</span>
                </div>
            </div>
            <div class="stat-card stat-on">
                <div class="stat-icon"><i class="fas fa-filter"></i></div>
                <div class="stat-info">
                    <span class="stat-value" id="total-filtrados">0</span>
                    <span class="stat-label">Exibidos</span>
                </div>
            </div>
            <div class="stat-card stat-off">
                <div class="stat-icon"><i class="fas fa-puzzle-piece"></i></div>
                <div class="stat-info">
                    <span class="stat-value" id="clp-modulos-count">0</span>
                    <span class="stat-label" id="clp-modulos-label">Módulos</span>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-server"></i>
                    <span id="clp-titulo">CLP</span>
                    <small id="clp-modelo" style="font-weight: 400; opacity: 0.7; font-size: 0.85rem;"></small>
                </h2>
                <div class="d-flex" style="display:flex; gap:0.4rem; align-items:center;">
                    <button id="btn-prev" class="btn-clear-filter" onclick="navegarCLP(-1)" title="CLP anterior">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <span id="clp-nav-counter" style="font-size:0.82rem; color:var(--text-light); min-width:60px; text-align:center;"></span>
                    <button id="btn-next" class="btn-clear-filter" onclick="navegarCLP(1)" title="Próximo CLP">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>

            <p id="clp-descricao" style="color: var(--text-light); margin: 0 0 1rem 0; font-size: 0.9rem;"></p>

            <div class="filters" style="margin-bottom: 1.25rem;">
                <input type="text" id="filtro-busca" placeholder="🔎 Buscar por descrição, tipo, endereço..." oninput="filtrarTabela()">
                <button class="btn-clear-filter" onclick="document.getElementById('filtro-busca').value=''; filtrarTabela();" title="Limpar filtro">
                    <i class="fas fa-undo"></i> Limpar
                </button>
                <button class="btn-clear-filter" onclick="navigateTo('clps')" title="Voltar à lista de CLPs">
                    <i class="fas fa-list"></i> Lista de CLPs
                </button>
            </div>

            <div id="clp-tables-container">
                <!-- Tabelas serão renderizadas aqui pelo JS -->
            </div>
        </div>
    </div>

    <!-- Modal: Adicionar / Editar Ponto I/O -->
    <div id="pontoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="pontoModalTitle"><i class="fas fa-edit"></i> Editar Ponto I/O</h2>
                <button class="close" onclick="closePontoModal()">&times;</button>
            </div>
            <div class="modal-body" id="pontoFormFields">
                <!-- Inputs dinâmicos populados pelo clp.js -->
            </div>
            <div class="modal-footer">
                <span style="flex: 1;"></span>
                <button class="btn-cancel" onclick="closePontoModal()">Cancelar</button>
                <button class="btn-save" onclick="salvarPonto()">
                    <i class="fas fa-save"></i> Salvar
                </button>
            </div>
        </div>
    </div>

    <!-- Dados injetados do Flask -->
    <script>
        const CLP_DATA = {{ clp_data | tojson }};
        const CLP_IP = '{{ clp_ip }}';
        const CLP_IPS_ORDERED = {{ clp_ips_ordered | tojson }};
    </script>

    <!-- Script -->
    <script src="{{ url_for('static', filename='clp.js') }}"></script>
</main>

<footer class="footer">
    <div class="footer-content">
        <div class="footer-info">
            <i class="fas fa-network-wired"></i>
            <span>IP Monitor - Monitoramento de Dispositivos de Rede</span>
            <span class="footer-separator">|</span>
            <span class="footer-year">2026</span>
        </div>
        <div class="footer-credits">
            <i class="fas fa-code"></i>
            <span>Desenvolvido por <strong>Eng. Pedro Henrique</strong></span>
        </div>
    </div>
</footer>
<script src="{{ url_for('static', filename='nav-clps.js') }}"></script>
</body>
</html>
